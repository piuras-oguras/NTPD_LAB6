name: Build and push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions: 
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Logowanie do GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Budowanie obrazu
        run: |
          docker build -t ghcr.io/${{ github.repository }}/iris-api:latest .

      - name: Push obrazu
        run : |
          docker push ghcr.io/${{ github.repository }}/iris-api:latest
